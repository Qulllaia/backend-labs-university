basePath: /lr4
definitions:
  dto.CreateProductDTO:
    properties:
      createdat:
        type: string
      description:
        maxLength: 200
        type: string
      name:
        minLength: 3
        type: string
      price:
        maximum: 1000
        minimum: 100
        type: integer
    required:
    - name
    - price
    type: object
  dto.ProductDTO:
    properties:
      createdat:
        type: string
      description:
        maxLength: 200
        type: string
      id:
        type: integer
      name:
        minLength: 3
        type: string
      price:
        maximum: 1000
        minimum: 100
        type: integer
    required:
    - name
    - price
    type: object
  dto.ServerErrorResponse:
    properties:
      error:
        type: string
    type: object
host: localhost:5000
info:
  contact: {}
  title: Swagger Example API
paths:
  /products:
    get:
      description: Returns a list of all products
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.ProductDTO'
            type: array
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ServerErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ServerErrorResponse'
      summary: Get all products
      tags:
      - products
    post:
      consumes:
      - application/json
      description: Creates a new product with the provided data
      parameters:
      - description: Product data
        in: body
        name: product
        required: true
        schema:
          $ref: '#/definitions/dto.CreateProductDTO'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.CreateProductDTO'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ServerErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ServerErrorResponse'
      summary: Create a new product
      tags:
      - products
    put:
      consumes:
      - application/json
      description: Updates an existing product by ID
      parameters:
      - description: Updated product data
        in: body
        name: product
        required: true
        schema:
          $ref: '#/definitions/dto.ProductDTO'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ProductDTO'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ServerErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ServerErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ServerErrorResponse'
      summary: Update a product
      tags:
      - products
  /products/{id}:
    delete:
      description: Deletes a product by ID
      parameters:
      - description: Product ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ServerErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ServerErrorResponse'
      summary: Delete a product
      tags:
      - products
    get:
      description: Returns a single product by its ID
      parameters:
      - description: Product ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ProductDTO'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ServerErrorResponse'
      summary: Get product by ID
      tags:
      - products
swagger: "2.0"
